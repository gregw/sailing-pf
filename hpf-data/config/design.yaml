# Boat-to-design overrides: assign a specific designId to boats identified by sail number + name.
# Use this for boats that import without a design (e.g. PHS-only boats) or with the wrong design.
# canonicalName sets the display name used when the design is auto-created (optional; defaults to designId).
boatDesignOverrides:
  - designId: "sydney36mkii"
    canonicalName: "Sydney 36 MkII"
    boats:
      - sailNumber: "5915"
        name: "Stormaway"
      - sailNumber: "6499"
        name: "Supernova"
      - sailNumber: "RF360"
        name: "This Way Up"
