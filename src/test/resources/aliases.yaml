# Design name equivalences.
# Key: canonical design ID (normalised, e.g. "sydney36cr").
# aliases: alternate names that should resolve to this design.
designs:
  sydney36cr:
    canonicalName: Sydney 36 CR
    aliases:
      - Sydney 36 OD

# Boat name aliases, keyed by normSail-normName.
# Each alias has optional 'name' and 'sailNumber' fields; null means use the canonical value.
boats:
  MYC7-daydreaming:
    canonicalName: Day Dreaming
    aliases:
      - name: "1060"
      - name: TenSixty
