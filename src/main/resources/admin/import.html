<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HPF — Import</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="site-nav">
    <a href="/" class="nav-home">HPF</a>
    <a href="import.html">Import</a>
    <a href="data.html">Data</a>
    <a href="analysis.html">Analysis</a>
  </nav>

  <h1>Import</h1>

  <section>
    <h2>Tasks
      <button id="stop-schedule-btn" style="display:none;margin-left:1rem;background:#c62828;color:#fff;border:none;padding:0.3rem 0.8rem;border-radius:4px;cursor:pointer"
              onclick="stopSchedule()">Stop schedule</button>
    </h2>
    <table class="importer-table">
      <thead>
        <tr>
          <th></th>
          <th>Task</th>
          <th>Status</th>
          <th>Run</th>
          <th>In schedule</th>
        </tr>
      </thead>
      <tbody id="importers-body"></tbody>
    </table>
  </section>

  <section>
    <h2>Schedule</h2>
    <p>Select days to run all ticked importers sequentially, then refresh analysis. No days selected = disabled.</p>
    <div class="schedule-days" id="schedule-days"></div>
    <label>Time: <input type="time" id="schedule-time" value="03:00"></label>
    <label>Target IRC year: <input type="number" id="target-irc-year" min="2019" max="2099"
           style="width:5em" placeholder="auto"></label>
    <button onclick="saveSchedule()">Save schedule</button>
  </section>

  <script src="common.js"></script>
  <script src="import.js"></script>
</body>
</html>
