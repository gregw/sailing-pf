<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HPF — Data Browser</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<!-- INCLUDE _nav.html -->

  <div id="import-banner" class="import-warning-banner" style="display:none">
    Data import is in progress — results may be incomplete or stale
  </div>

  <h1>Data Browser</h1>

  <div class="tabs">
    <div class="tab active" id="tab-btn-boats" onclick="switchTab('boats')">Boats <a href="docs.html#table-boats" class="info-btn" data-tip="All boats in the database: sail number, name, design, reference factor and HPF." target="_blank" onclick="event.stopPropagation()">ⓘ</a></div>
    <div class="tab" id="tab-btn-designs" onclick="switchTab('designs')">Designs <a href="docs.html#table-designs" class="info-btn" data-tip="Boat designs (classes): canonical name, design-level reference factor, and maker." target="_blank" onclick="event.stopPropagation()">ⓘ</a></div>
    <div class="tab" id="tab-btn-clubs" onclick="switchTab('clubs')">Clubs <a href="docs.html#table-clubs" class="info-btn" data-tip="Sailing clubs: source of race data; club ID is the club's website domain." target="_blank" onclick="event.stopPropagation()">ⓘ</a></div>
    <div class="tab" id="tab-btn-races" onclick="switchTab('races')">Races <a href="docs.html#table-races" class="info-btn" data-tip="Individual race results imported from SailSys, TopYacht, and BWPS." target="_blank" onclick="event.stopPropagation()">ⓘ</a></div>
  </div>

  <div id="panel-boats" class="tab-panel active">
    <div id="filter-banner-boats" class="filter-banner" style="display:none"></div>
    <div class="search-row">
      <input type="text" id="q-boats" placeholder="Search by id or name…" oninput="debounceSearch('boats')">
      <button onclick="doSearch('boats')">Search</button>
      <label style="margin-left:0.5rem;"><input type="checkbox" id="filter-dupe-sails" onchange="doSearch('boats')"> Duplicate sail numbers</label>
      <label style="margin-left:0.5rem;"><input type="checkbox" id="show-excluded-boats" onchange="doSearch('boats')"> Show excluded</label>
      <label style="margin-left:auto;">Rows: <select id="page-size-boats" onchange="setPageSize(this.value)">
        <option value="10">10</option>
        <option value="25" selected>25</option>
        <option value="50">50</option>
        <option value="100">100</option>
      </select></label>
    </div>
    <div class="pagination" id="pager-top-boats"></div>
    <table>
      <thead><tr id="thead-boats"></tr></thead>
      <tbody id="tbody-boats"></tbody>
    </table>
    <div class="pagination" id="pager-boats"></div>

    <div id="merge-bar-boats" style="display:none; margin-top:0.75rem; padding:0.6rem 0.8rem; background:#fff8e1; border:1px solid #f0c040; border-radius:4px;">
      <span id="merge-bar-count-boats"></span>
      <button onclick="showMergePanel('boats')" style="margin-left:0.5rem;">Merge selected…</button>
      <button onclick="clearSelection('boats')" style="margin-left:0.5rem;">Clear selection</button>
    </div>

    <div id="merge-panel-boats" style="display:none; margin-top:0.75rem; padding:0.8rem; border:1px solid #ccc; border-radius:4px; background:#fafafa;">
      <strong>Select the canonical boat to keep:</strong>
      <div id="merge-radio-list-boats" style="margin:0.6rem 0;"></div>
      <button onclick="performMerge('boats')">Confirm merge</button>
      <button onclick="hideMergePanel('boats')" style="margin-left:0.5rem;">Cancel</button>
      <div id="merge-status-boats" style="margin-top:0.5rem; color:#555;"></div>
    </div>

    <div class="detail-panel" id="detail-boats">
      <div id="ref-factors-boats" style="margin-bottom:0.75rem;"></div>
      <div id="hpf-detail-boats" style="margin-bottom:0.75rem;"></div>
      <div id="pre-boats" class="json-tree"></div>
    </div>
  </div>

  <div id="panel-designs" class="tab-panel">
    <div id="filter-banner-designs" class="filter-banner" style="display:none"></div>
    <div class="search-row">
      <input type="text" id="q-designs" placeholder="Search by id or name…" oninput="debounceSearch('designs')">
      <button onclick="doSearch('designs')">Search</button>
      <label style="margin-left:0.5rem;"><input type="checkbox" id="show-excluded-designs" onchange="doSearch('designs')"> Show excluded</label>
      <label style="margin-left:auto;">Rows: <select id="page-size-designs" onchange="setPageSize(this.value)">
        <option value="10">10</option>
        <option value="25" selected>25</option>
        <option value="50">50</option>
        <option value="100">100</option>
      </select></label>
    </div>
    <div class="pagination" id="pager-top-designs"></div>
    <table>
      <thead><tr id="thead-designs"></tr></thead>
      <tbody id="tbody-designs"></tbody>
    </table>
    <div class="pagination" id="pager-designs"></div>

    <div id="merge-bar-designs" style="display:none; margin-top:0.75rem; padding:0.6rem 0.8rem; background:#fff8e1; border:1px solid #f0c040; border-radius:4px;">
      <span id="merge-bar-count-designs"></span>
      <button onclick="showMergePanel('designs')" style="margin-left:0.5rem;">Merge selected…</button>
      <button onclick="clearSelection('designs')" style="margin-left:0.5rem;">Clear selection</button>
    </div>

    <div id="merge-panel-designs" style="display:none; margin-top:0.75rem; padding:0.8rem; border:1px solid #ccc; border-radius:4px; background:#fafafa;">
      <strong>Select the canonical design to keep:</strong>
      <div id="merge-radio-list-designs" style="margin:0.6rem 0;"></div>
      <button onclick="performMerge('designs')">Confirm merge</button>
      <button onclick="hideMergePanel('designs')" style="margin-left:0.5rem;">Cancel</button>
      <div id="merge-status-designs" style="margin-top:0.5rem; color:#555;"></div>
    </div>

    <div class="detail-panel" id="detail-designs"><div id="pre-designs" class="json-tree"></div></div>
  </div>

  <div id="panel-clubs" class="tab-panel">
    <div id="filter-banner-clubs" class="filter-banner" style="display:none"></div>
    <div class="search-row">
      <input type="text" id="q-clubs" placeholder="Search by id, short name or long name…" oninput="debounceSearch('clubs')">
      <button onclick="doSearch('clubs')">Search</button>
      <label style="margin-left:0.5rem;"><input type="checkbox" id="show-excluded-clubs" onchange="doSearch('clubs')"> Show excluded</label>
      <label style="margin-left:auto;">Rows: <select id="page-size-clubs" onchange="setPageSize(this.value)">
        <option value="10">10</option>
        <option value="25" selected>25</option>
        <option value="50">50</option>
        <option value="100">100</option>
      </select></label>
    </div>
    <div class="pagination" id="pager-top-clubs"></div>
    <table>
      <thead><tr id="thead-clubs"></tr></thead>
      <tbody id="tbody-clubs"></tbody>
    </table>
    <div class="pagination" id="pager-clubs"></div>
    <div class="detail-panel" id="detail-clubs"><div id="pre-clubs" class="json-tree"></div></div>
  </div>

  <div id="panel-races" class="tab-panel">
    <div id="filter-banner-races" class="filter-banner" style="display:none"></div>
    <div class="search-row">
      <input type="text" id="q-races" placeholder="Search by id or club…" oninput="debounceSearch('races')">
      <button onclick="doSearch('races')">Search</button>
      <label style="margin-left:0.5rem;"><input type="checkbox" id="show-excluded-races" onchange="doSearch('races')"> Show excluded</label>
      <label style="margin-left:auto;">Rows: <select id="page-size-races" onchange="setPageSize(this.value)">
        <option value="10">10</option>
        <option value="25" selected>25</option>
        <option value="50">50</option>
        <option value="100">100</option>
      </select></label>
    </div>
    <div class="pagination" id="pager-top-races"></div>
    <table>
      <thead><tr id="thead-races"></tr></thead>
      <tbody id="tbody-races"></tbody>
    </table>
    <div class="pagination" id="pager-races"></div>

    <div id="division-section-races" style="display:none; margin-top:1rem;">
      <div style="font-weight:bold;margin-bottom:0.25rem;">Division Chart <a href="docs.html#chart-division" class="info-btn" data-tip="Bar chart of elapsed and  RF/HPF corrected times for each finisher in the selected division against the HPF.  Elapsed time line should slope up with higher HPF; the corrected time lines should be level if the Factor was correct for this race." target="_blank">ⓘ</a></div>
      <div style="display:flex;gap:1.5rem;align-items:center;margin:0.5rem 0;">
        <label>Division: <select id="race-division-select" onchange="onRaceDivisionChange()"></select></label>
        <span id="race-variant-label" style="font-size:0.9rem;color:#555;"></span>
        <label><input type="checkbox" id="race-show-error-bars" onchange="onRaceErrorBarsChange()"> Error bars</label>
      </div>
      <div id="race-division-chart" style="width:100%;height:400px;"></div>
      <div class="division-nav" style="margin-top:0.5rem;">
        <button id="race-prev-btn" onclick="prevRace()" disabled>&#8592; Prev</button>
        <span id="race-div-title" style="flex:1;text-align:center;font-weight:bold;font-size:1rem;"></span>
        <button id="race-next-btn" onclick="nextRace()" disabled>Next &#8594;</button>
      </div>
    </div>

    <div class="detail-panel" id="detail-races"><div id="pre-races" class="json-tree"></div></div>
  </div>

  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js" charset="utf-8"></script>
  <script src="common.js"></script>
  <script src="data.js"></script>
</body>
</html>
