<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HPF — Data Browser</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<!-- INCLUDE _nav.html -->

  <div id="import-banner" class="import-warning-banner" style="display:none">
    Data import is in progress — results may be incomplete or stale
  </div>

  <h1>Data Browser</h1>

  <div class="tabs">
    <div class="tab active" id="tab-btn-clubs" onclick="switchTab('clubs')">Clubs <a href="docs.html#table-clubs" class="info-btn" data-tip="Sailing clubs: source of race data; club ID is the club's website domain." target="_blank" onclick="event.stopPropagation()">ⓘ</a></div>
    <div class="tab" id="tab-btn-boats" onclick="switchTab('boats')">Boats <a href="docs.html#table-boats" class="info-btn" data-tip="All boats in the database: sail number, name, design, reference factor and HPF." target="_blank" onclick="event.stopPropagation()">ⓘ</a></div>
    <div class="tab" id="tab-btn-designs" onclick="switchTab('designs')">Designs <a href="docs.html#table-designs" class="info-btn" data-tip="Boat designs (classes): canonical name, design-level reference factor, and maker." target="_blank" onclick="event.stopPropagation()">ⓘ</a></div>
    <div class="tab" id="tab-btn-series" onclick="switchTab('series')">Series <a href="docs.html#table-series" class="info-btn" data-tip="Named series of races: club, name, date range and race count." target="_blank" onclick="event.stopPropagation()">ⓘ</a></div>
    <div class="tab" id="tab-btn-races" onclick="switchTab('races')">Races <a href="docs.html#table-races" class="info-btn" data-tip="Individual race results imported from SailSys, TopYacht, and BWPS." target="_blank" onclick="event.stopPropagation()">ⓘ</a></div>
  </div>

  <div id="panel-boats" class="tab-panel">
    <div id="filter-banner-boats" class="filter-banner" style="display:none"></div>
    <div class="search-row">
      <input type="text" id="q-boats" placeholder="Search by id or name…" oninput="debounceSearch('boats')">
      <button class="search-clear-btn" title="Clear search" onclick="clearSearch('boats')">✕</button>
      <button onclick="doSearch('boats')">Search</button>
      <label style="margin-left:0.5rem;"><input type="checkbox" id="filter-dupe-sails" onchange="doSearch('boats')"> Duplicate sail numbers</label>
      <label style="margin-left:0.5rem;"><input type="checkbox" id="show-excluded-boats" onchange="doSearch('boats')"> Show excluded</label>
      <label style="margin-left:0.5rem;"><input type="checkbox" id="exclude-nulls-boats" onchange="doSearch('boats')"> Exclude nulls</label>
      <label style="margin-left:auto;">Rows: <select id="page-size-boats" onchange="setPageSize(this.value)">
        <option value="10">10</option>
        <option value="25" selected>25</option>
        <option value="50">50</option>
        <option value="100">100</option>
      </select></label>
    </div>
    <div class="pagination" id="pager-top-boats"></div>
    <table>
      <thead><tr id="thead-boats"></tr></thead>
      <tbody id="tbody-boats"></tbody>
    </table>
    <div class="pagination" id="pager-boats"></div>

    <div id="merge-bar-boats" style="display:none; margin-top:0.75rem; padding:0.6rem 0.8rem; background:#fff8e1; border:1px solid #f0c040; border-radius:4px;">
      <span id="merge-bar-count-boats"></span>
      <button id="merge-btn-boats" onclick="showMergePanel('boats')" style="margin-left:0.5rem;">Merge selected…</button>
      <button id="merge-request-btn-boats" onclick="showMergePanel('boats')" style="margin-left:0.5rem;display:none;">Request merge…</button>
      <button onclick="clearSelection('boats')" style="margin-left:0.5rem;">Clear selection</button>
    </div>

    <div id="merge-panel-boats" style="display:none; margin-top:0.75rem; padding:0.8rem; border:1px solid #ccc; border-radius:4px; background:#fafafa;">
      <strong>Select the canonical boat to keep:</strong>
      <div id="merge-radio-list-boats" style="margin:0.6rem 0;"></div>
      <div id="merge-email-row-boats" style="display:none; margin-bottom:0.5rem;">
        <label for="merge-email-boats" style="font-size:0.9rem;">Your email (optional): </label>
        <input type="email" id="merge-email-boats" placeholder="you@example.com" style="padding:3px 6px;" oninput="syncRequestEmail(this.value)">
      </div>
      <div id="merge-message-row-boats" style="display:none; margin-bottom:0.5rem;">
        <label for="merge-message-boats" style="font-size:0.9rem;">Message (optional):</label><br>
        <textarea id="merge-message-boats" rows="2" style="width:100%;max-width:400px;padding:3px 6px;font-size:0.9rem;" placeholder="Reason for merge…"></textarea>
      </div>
      <button id="merge-confirm-boats" onclick="performMerge('boats')">Confirm merge</button>
      <button id="merge-request-confirm-boats" onclick="requestMerge('boats')" style="display:none;">Request merge</button>
      <button onclick="hideMergePanel('boats')" style="margin-left:0.5rem;">Cancel</button>
      <div id="merge-status-boats" style="margin-top:0.5rem; color:#555;"></div>
    </div>

    <div class="detail-panel" id="detail-boats">
      <div id="ref-factors-boats" style="margin-bottom:0.75rem;"></div>
      <div id="hpf-detail-boats" style="margin-bottom:0.75rem;"></div>
      <div id="aliases-boats" style="margin-bottom:0.75rem;"></div>
      <div id="edit-btn-container" style="margin-bottom:0.75rem;display:none;"><button onclick="showEditPanel()">Edit boat…</button></div>
      <div id="edit-panel-boats" style="display:none; margin-bottom:0.75rem; padding:0.8rem; border:1px solid #ccc; border-radius:4px; background:#fafafa;">
        <strong>Edit Boat</strong>
        <div style="display:grid;grid-template-columns:auto 1fr;gap:0.3rem 0.8rem;max-width:500px;margin:0.5rem 0;">
          <label for="edit-boat-sail">Sail #:</label>
          <input type="text" id="edit-boat-sail" style="font-family:monospace;padding:3px 6px;">
          <label for="edit-boat-name">Name:</label>
          <input type="text" id="edit-boat-name" style="font-family:monospace;padding:3px 6px;">
          <label for="edit-boat-design">Design:</label>
          <select id="edit-boat-design" style="font-family:monospace;padding:3px 6px;"></select>
          <label for="edit-boat-club">Club:</label>
          <select id="edit-boat-club" style="font-family:monospace;padding:3px 6px;"></select>
        </div>
        <div id="edit-email-row" style="display:none; margin-bottom:0.5rem;">
          <label for="edit-email" style="font-size:0.9rem;">Your email (optional): </label>
          <input type="email" id="edit-email" placeholder="you@example.com" style="padding:3px 6px;" oninput="syncRequestEmail(this.value)">
        </div>
        <div id="edit-message-row" style="display:none; margin-bottom:0.5rem;">
          <label for="edit-message" style="font-size:0.9rem;">Message (optional):</label><br>
          <textarea id="edit-message" rows="2" style="width:100%;max-width:400px;padding:3px 6px;font-size:0.9rem;" placeholder="Reason for edit…"></textarea>
        </div>
        <button id="edit-save-btn" onclick="saveBoatEdit()">Save</button>
        <button id="edit-request-btn" onclick="requestBoatEdit()" style="display:none;">Request</button>
        <button onclick="hideEditPanel()" style="margin-left:0.5rem;">Cancel</button>
        <div id="edit-status-boats" style="margin-top:0.5rem; color:#555;"></div>
      </div>
      <div id="pre-boats" class="json-tree"></div>
    </div>
  </div>

  <div id="panel-designs" class="tab-panel">
    <div id="filter-banner-designs" class="filter-banner" style="display:none"></div>
    <div class="search-row">
      <input type="text" id="q-designs" placeholder="Search by id or name…" oninput="debounceSearch('designs')">
      <button class="search-clear-btn" title="Clear search" onclick="clearSearch('designs')">✕</button>
      <button onclick="doSearch('designs')">Search</button>
      <label style="margin-left:0.5rem;"><input type="checkbox" id="show-excluded-designs" onchange="doSearch('designs')"> Show excluded</label>
      <label style="margin-left:0.5rem;"><input type="checkbox" id="exclude-nulls-designs" onchange="doSearch('designs')"> Exclude nulls</label>
      <label style="margin-left:auto;">Rows: <select id="page-size-designs" onchange="setPageSize(this.value)">
        <option value="10">10</option>
        <option value="25" selected>25</option>
        <option value="50">50</option>
        <option value="100">100</option>
      </select></label>
    </div>
    <div class="pagination" id="pager-top-designs"></div>
    <table>
      <thead><tr id="thead-designs"></tr></thead>
      <tbody id="tbody-designs"></tbody>
    </table>
    <div class="pagination" id="pager-designs"></div>

    <div id="merge-bar-designs" style="display:none; margin-top:0.75rem; padding:0.6rem 0.8rem; background:#fff8e1; border:1px solid #f0c040; border-radius:4px;">
      <span id="merge-bar-count-designs"></span>
      <button id="merge-btn-designs" onclick="showMergePanel('designs')" style="margin-left:0.5rem;">Merge selected…</button>
      <button id="merge-request-btn-designs" onclick="showMergePanel('designs')" style="margin-left:0.5rem;display:none;">Request merge…</button>
      <button onclick="clearSelection('designs')" style="margin-left:0.5rem;">Clear selection</button>
    </div>

    <div id="merge-panel-designs" style="display:none; margin-top:0.75rem; padding:0.8rem; border:1px solid #ccc; border-radius:4px; background:#fafafa;">
      <strong>Select the canonical design to keep:</strong>
      <div id="merge-radio-list-designs" style="margin:0.6rem 0;"></div>
      <div id="merge-email-row-designs" style="display:none; margin-bottom:0.5rem;">
        <label for="merge-email-designs" style="font-size:0.9rem;">Your email (optional): </label>
        <input type="email" id="merge-email-designs" placeholder="you@example.com" style="padding:3px 6px;" oninput="syncRequestEmail(this.value)">
      </div>
      <div id="merge-message-row-designs" style="display:none; margin-bottom:0.5rem;">
        <label for="merge-message-designs" style="font-size:0.9rem;">Message (optional):</label><br>
        <textarea id="merge-message-designs" rows="2" style="width:100%;max-width:400px;padding:3px 6px;font-size:0.9rem;" placeholder="Reason for merge…"></textarea>
      </div>
      <button id="merge-confirm-designs" onclick="performMerge('designs')">Confirm merge</button>
      <button id="merge-request-confirm-designs" onclick="requestMerge('designs')" style="display:none;">Request merge</button>
      <button onclick="hideMergePanel('designs')" style="margin-left:0.5rem;">Cancel</button>
      <div id="merge-status-designs" style="margin-top:0.5rem; color:#555;"></div>
    </div>

    <div class="detail-panel" id="detail-designs"><div id="pre-designs" class="json-tree"></div></div>
  </div>

  <div id="panel-clubs" class="tab-panel active">
    <div id="filter-banner-clubs" class="filter-banner" style="display:none"></div>
    <div class="search-row">
      <input type="text" id="q-clubs" placeholder="Search by id, short name or long name…" oninput="debounceSearch('clubs')">
      <button class="search-clear-btn" title="Clear search" onclick="clearSearch('clubs')">✕</button>
      <button onclick="doSearch('clubs')">Search</button>
      <label style="margin-left:0.5rem;"><input type="checkbox" id="show-excluded-clubs" onchange="doSearch('clubs')"> Show excluded</label>
      <label style="margin-left:0.5rem;"><input type="checkbox" id="exclude-nulls-clubs" onchange="doSearch('clubs')"> Exclude nulls</label>
      <label style="margin-left:auto;">Rows: <select id="page-size-clubs" onchange="setPageSize(this.value)">
        <option value="10">10</option>
        <option value="25" selected>25</option>
        <option value="50">50</option>
        <option value="100">100</option>
      </select></label>
    </div>
    <div class="pagination" id="pager-top-clubs"></div>
    <table>
      <thead><tr id="thead-clubs"></tr></thead>
      <tbody id="tbody-clubs"></tbody>
    </table>
    <div class="pagination" id="pager-clubs"></div>
    <div class="detail-panel" id="detail-clubs"><div id="pre-clubs" class="json-tree"></div></div>
  </div>

  <div id="panel-races" class="tab-panel">
    <div id="filter-banner-races" class="filter-banner" style="display:none"></div>
    <div class="search-row">
      <input type="text" id="q-races" placeholder="Search by id, series or race name…" oninput="debounceSearch('races')">
      <button class="search-clear-btn" title="Clear search" onclick="clearSearch('races')">✕</button>
      <button onclick="doSearch('races')">Search</button>
      <label style="margin-left:0.5rem;"><input type="checkbox" id="show-excluded-races" onchange="doSearch('races')"> Show excluded</label>
      <label style="margin-left:0.5rem;"><input type="checkbox" id="exclude-nulls-races" onchange="doSearch('races')"> Exclude empty</label>
      <label style="margin-left:auto;">Rows: <select id="page-size-races" onchange="setPageSize(this.value)">
        <option value="10">10</option>
        <option value="25" selected>25</option>
        <option value="50">50</option>
        <option value="100">100</option>
      </select></label>
    </div>
    <div class="pagination" id="pager-top-races"></div>
    <table>
      <thead><tr id="thead-races"></tr></thead>
      <tbody id="tbody-races"></tbody>
    </table>
    <div class="pagination" id="pager-races"></div>

    <div id="division-section-races" style="display:none; margin-top:1rem;">
      <div id="race-series-race-label" style="font-size:1.05rem;font-weight:bold;margin-bottom:0.4rem;"></div>
      <div style="font-weight:bold;margin-bottom:0.25rem;">Division Chart <a href="docs.html#chart-division" class="info-btn" data-tip="Bar chart of elapsed and  RF/HPF corrected times for each finisher in the selected division against the HPF.  Elapsed time line should slope up with higher HPF; the corrected time lines should be level if the Factor was correct for this race." target="_blank">ⓘ</a></div>
      <div style="display:flex;gap:1.5rem;align-items:center;margin:0.5rem 0;">
        <label>Division: <select id="race-division-select" onchange="onRaceDivisionChange()"></select></label>
        <span id="race-variant-label" style="font-size:0.9rem;color:#555;"></span>
        <label><input type="checkbox" id="race-show-rf" checked onchange="onRaceRfChange()"> RF line</label>
        <label><input type="checkbox" id="race-show-error-bars" onchange="onRaceErrorBarsChange()"> Error bars</label>
        <label><input type="checkbox" id="race-show-trend" onchange="onRaceTrendChange()"> Trend line</label>
      </div>
      <div id="race-division-note" style="font-size:0.85rem;color:#888;margin-bottom:0.25rem;"></div>
      <div id="race-division-chart" style="width:100%;height:400px;"></div>
      <div id="race-compare-btn-container"></div>
      <div class="division-nav" style="margin-top:0.5rem;">
        <button id="race-prev-btn" onclick="prevRace()" disabled>&#8592; Prev</button>
        <span id="race-div-title" style="flex:1;text-align:center;font-weight:bold;font-size:1rem;"></span>
        <button id="race-next-btn" onclick="nextRace()" disabled>Next &#8594;</button>
      </div>
    </div>

    <div class="detail-panel" id="detail-races"><div id="pre-races" class="json-tree"></div></div>
  </div>

  <div id="panel-series" class="tab-panel">
    <div id="filter-banner-series" class="filter-banner" style="display:none"></div>
    <div class="search-row">
      <input type="text" id="q-series" placeholder="Search by club or series name…" oninput="debounceSearch('series')">
      <button class="search-clear-btn" title="Clear search" onclick="clearSearch('series')">✕</button>
      <button onclick="doSearch('series')">Search</button>
      <label style="margin-left:0.5rem;"><input type="checkbox" id="exclude-empty-series" checked onchange="doSearch('series')"> Exclude empty</label>
      <label style="margin-left:auto;">Rows: <select id="page-size-series" onchange="setPageSize(this.value)">
        <option value="10">10</option>
        <option value="25" selected>25</option>
        <option value="50">50</option>
        <option value="100">100</option>
      </select></label>
    </div>
    <div class="pagination" id="pager-top-series"></div>
    <table>
      <thead><tr id="thead-series"></tr></thead>
      <tbody id="tbody-series"></tbody>
    </table>
    <div class="pagination" id="pager-series"></div>
    <div id="series-chart-section" style="display:none; margin-top:1rem;">
      <div id="series-chart-label" style="font-size:1.05rem;font-weight:bold;margin-bottom:0.4rem;"></div>
      <div style="display:flex;gap:1.5rem;align-items:center;margin:0.5rem 0;">
        <label>Division: <select id="series-division-select" onchange="onSeriesDivisionChange()"></select></label>
      </div>
      <div id="series-chart" style="width:100%;height:500px;"></div>
      <div id="series-compare-btn-container"></div>
    </div>
    <div class="detail-panel" id="detail-series"></div>
  </div>

  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js" charset="utf-8"></script>
  <script src="common.js"></script>
  <script src="data.js"></script>
</body>
</html>
