<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HPF — Design Comparison</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js" charset="utf-8"></script>
</head>
<body>
<!-- INCLUDE _nav.html -->

  <h1>Design Comparison</h1>

  <div class="comparison-controls">
    <div class="selector-panels">
      <div class="selector-panel">
        <h3>Design A <span id="label-a" style="color:#2255aa;font-weight:normal;font-size:0.9rem;"></span></h3>
        <input type="text" id="search-a" class="selector-search" placeholder="Search by design name…">
        <div id="list-a" class="selector-list"></div>
        <button id="select-a-btn" disabled>Select Design A</button>
      </div>
      <div class="selector-panel">
        <h3>Design B <span id="label-b" style="color:#c47900;font-weight:normal;font-size:0.9rem;"></span></h3>
        <input type="text" id="search-b" class="selector-search" placeholder="Search by design name…">
        <div id="list-b" class="selector-list"></div>
        <button id="select-b-btn" disabled>Select Design B</button>
      </div>
    </div>
    <div class="comparison-options-row">
      <label class="variant-label">
        Variant:
        <select id="variant-selector" title="Which handicap variant to display">
          <option value="spin">Spin</option>
          <option value="nonSpin">Non-Spin</option>
        </select>
      </label>
    </div>
  </div>

  <div style="font-weight:bold;margin-bottom:0.25rem;">Design Comparison Chart <a href="docs.html#chart-design-comparison" class="info-btn" data-tip="Scatter plot comparing elapsed times for two selected designs. Blue = Design A, amber = Design B.  A good linear fit close to the projected RF indicates these designs are good for handicap comparisons. " target="_blank">ⓘ</a></div>
  <div id="design-comparison-chart" style="width:100%;height:520px;margin-top:0.5rem;"></div>

  <div id="design-calc" style="display:none; margin-top:1.25rem;">
    <h3 style="margin:0 0 0.5rem;">Handicap Calculator <a href="docs.html#table-hpf-calc" class="info-btn" data-tip="Calculator to generate handicaps based on the RF ratio of designs. Enter a handicap for Design A to compute the equivalent for Design B using RF ratio and best-fit conversion." target="_blank">ⓘ</a></h3>
    <p id="calc-ratios" style="margin:0 0 0.75rem;color:#666;font-size:0.85rem;"></p>
    <table class="hpf-calc-table">
      <thead>
        <tr>
          <th></th>
          <th id="calc-name-a" style="color:#2255aa;padding:3px 8px;">Design A</th>
          <th id="calc-name-b" style="color:#c47900;padding:3px 8px;">Design B</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>RF</td>
          <td id="calc-rf-a" style="font-family:monospace">—</td>
          <td id="calc-rf-b" style="font-family:monospace">—</td>
        </tr>
        <tr>
          <td>Enter handicap</td>
          <td><input type="number" id="calc-input-a" step="0.0001" min="0.1" max="2.0"
                     class="hpf-calc-input" placeholder="enter…"
                     style="width:90px;font-family:monospace;text-align:right;"
                     oninput="onCalcInput('a')"></td>
          <td><input type="number" id="calc-input-b" step="0.0001" min="0.1" max="2.0"
                     class="hpf-calc-input" placeholder="enter…"
                     style="width:90px;font-family:monospace;text-align:right;"
                     oninput="onCalcInput('b')"></td>
        </tr>
        <tr>
          <td>By RF ratio</td>
          <td id="calc-rf-result-a" style="font-family:monospace">—</td>
          <td id="calc-rf-result-b" style="font-family:monospace">—</td>
        </tr>
        <tr>
          <td>By best fit</td>
          <td id="calc-fit-result-a" style="font-family:monospace">—</td>
          <td id="calc-fit-result-b" style="font-family:monospace">—</td>
        </tr>
      </tbody>
    </table>
  </div>

  <script src="common.js"></script>
  <script src="design-comparison.js"></script>
</body>
</html>
